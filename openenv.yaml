env_id: usb-security-env
version: "1.0.0"
description: "USB intrusion detection environment"

tasks:
  - id: task_easy
    difficulty: easy
    max_steps: 5
    grader:
      type: llm
      prompt_template: "Score the USB security decision 0.0 to 1.0..."

  - id: task_medium
    difficulty: medium
    max_steps: 8
    grader:
      type: llm
      prompt_template: "Score the USB security decision 0.0 to 1.0..."

  - id: task_hard
    difficulty: hard
    max_steps: 12
    grader:
      type: llm
      prompt_template: "Score the USB security decision 0.0 to 1.0..."
